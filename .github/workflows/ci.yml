name: Docker Build and Push

on:
  push:
    branches: [ "main" ] # Срабатывает при пуше в ветку main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # Разрешение на запись в GitHub Packages

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Тегируем образ: 'latest' и 'sha-коммита'
          tags: |
            ghcr.io/${{ github.repository_owner }}/my-fastapi-app:latest
            ghcr.io/${{ github.repository_owner }}/my-fastapi-app:${{ github.sha }}
